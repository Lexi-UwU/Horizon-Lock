<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Horizon Lock Lite</title>
  <style>
    body { margin: 0; background: #000; color: #00ff88; font-family: monospace; overflow: hidden; }
    
    /* The Camera Container */
    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      position: absolute;
      min-width: 130%; /* Oversized so edges don't show when rotating */
      min-height: 130%;
      object-fit: cover;
      transition: transform 0.1s linear;
    }

    /* HUD Overlay */
    #hud {
      position: absolute;
      inset: 0;
      border: 2px solid rgba(0, 255, 136, 0.2);
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      z-index: 10;
    }

    .horizon-wire {
      position: absolute;
      top: 50%; left: 10%; right: 10%;
      height: 1px;
      background: #00ff88;
      box-shadow: 0 0 10px #00ff88;
    }

    #stats { font-size: 1.2rem; text-shadow: 0 0 5px #000; }
    #btn-init {
      position: absolute; z-index: 20;
      padding: 15px 30px; background: #00ff88; border: none;
      font-weight: bold; cursor: pointer; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>

  <button id="btn-init">START SYSTEM</button>

  <div id="container">
    <video id="v" autoplay playsinline muted></video>
    <div id="hud">
      <div id="stats">ROLL: 0.0°</div>
      <div class="horizon-wire"></div>
      <div style="text-align: right;">STATUS: ACTIVE</div>
    </div>
  </div>

  <script>
    const v = document.getElementById('v');
    const stats = document.getElementById('stats');
    const btn = document.getElementById('btn-init');

    async function start() {
      btn.style.display = 'none';
      
      // 1. Setup Camera
      const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: 'environment' } 
      });
      v.srcObject = stream;

      // 2. Request Orientation Permission (Required for iOS)
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        await DeviceOrientationEvent.requestPermission();
      }

      // 3. Listen for tilt
      window.addEventListener('deviceorientation', (e) => {
        // We negate e.gamma to counter-rotate against the phone's movement
        const roll = -(e.gamma || 0); 
        
        // Apply rotation + slight zoom to hide black corners
        v.style.transform = `rotate(${roll}deg) scale(1.4)`;
        stats.innerText = `ROLL: ${roll.toFixed(1)}°`;
      });
    }

    btn.onclick = start;
  </script>
</body>
</html>
